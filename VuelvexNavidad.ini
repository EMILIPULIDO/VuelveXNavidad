description.Spanish=<i>Vuelve por Navidad versión 3.0 (2025)</i>\nEscenario para Mansiones de la Locura 2ªEdición\n···\n\n<b><i>Llega la Navidad, y este año el tío Jeremiah Blackwood quiere que la celebremos tod@s junt@s.  \nPero algo te hace sospechar que la sorpresa no son los Reyes Magos.\nUna aventura donde prima la investigación.\n Para explorador@s de la verdad, con sabor a los mundos del Maestro HPL. </i></b> \n\n···\nEl autor ha decidido utilizar la @ en palabras sin género neutro, para que el máximo de personas puedan sentirse incluid@s. Asumiendo que puede no ser suficientemente integrador.\n\nEl tablero puede ocupar un espacio de 85x50cm.\n\nEste es un escenario hecho con cariño, pero totalmente amateur. Disculpad los posibles errores. Al final del juego tenéis la posibilidad de dejar comentarios. \nOs rogamos aportéis vuestra opinión y sugerencias para ir mejorándolo entre tod@s. \nGracias, espero que lo disfruteis tanto como yo al crearlo.\nAbundan los sonidos, así que ¡Encended los Altavoces!\n\n<b><i>Iä Iä ygnaiih !!</i></b>\n\n
authors.Spanish=\nKrakalun RedVelvet\n\nCorrección, traducción y apoyo espiritual:  \nCristina Hernado y Aida Franch\n\nAgradecimientos a @Vidimus
